name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      compare_baselines:
        description: "Run optional baseline comparison job"
        required: false
        default: false
        type: boolean

jobs:
  portable-check-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          moon version --all
          moon update

      - name: moon check
        shell: bash
        run: moon check

      - name: moon test
        shell: bash
        run: moon test

  coverage-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          moon version --all
          moon update

      - name: moon test with coverage
        shell: bash
        run: moon test --enable-coverage

      - name: moon coverage analyze
        shell: bash
        run: |
          moon coverage analyze > coverage-report.txt
          tail -n 20 coverage-report.txt

  windows-native-check-and-test:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          moon version --all
          moon update

      - name: moon check
        shell: pwsh
        run: moon check

      - name: moon test
        shell: pwsh
        run: moon test

      - name: Build native release binaries
        shell: pwsh
        run: moon build --target native --release

      - name: CLI smoke checks
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tests/cli/cli_smoke.ps1

      - name: CLI negative checks
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tests/cli/cli_negative.ps1

      - name: MCP STDIO smoke checks
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File tests/integration/mcp_stdio_smoke.ps1

      - name: OCR smoke checks
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File tests/ocr/ocr_force_smoke.ps1
          powershell -ExecutionPolicy Bypass -File tests/ocr/ocr_backend_missing.ps1
          powershell -ExecutionPolicy Bypass -File tests/ocr/ocr_timeout_smoke.ps1

      - name: Conversion eval
        shell: pwsh
        run: python tests/conversion_eval/scripts/run_eval.py run

  baseline-comparison:
    if: github.event_name == 'workflow_dispatch' && inputs.compare_baselines == true
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up MSVC developer shell
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install baseline tooling
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install "markitdown[all]" docling

      - name: Set up MoonBit
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"
          moon version --all
          moon update

      - name: Build native release binaries
        shell: pwsh
        run: moon build --target native --release

      - name: Conversion eval with baselines
        shell: pwsh
        run: python tests/conversion_eval/scripts/run_eval.py run --compare-baselines
